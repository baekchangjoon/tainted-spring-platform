name: tainted-spring-platform

# 추후 추가될 각 Spring 서비스는 이 앵커를 재사용한다.
# JAVA_TOOL_OPTIONS 는 비워 둔다 — 품질 도구가 -javaagent 등을 주입할 슬롯.
x-java-service: &java-service
  environment:
    JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
    SPRING_PROFILES_ACTIVE: "docker"
  restart: unless-stopped

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr,conf,stat"
    ports:
      - "2181:2181"
    healthcheck:
      # cub zk-ready 는 cp-zookeeper 이미지에 기본 포함(cp-base-new 유래). nc 미사용.
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "10"]
      interval: 10s
      timeout: 15s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
    ports:
      - "3306:3306"
    volumes:
      - ./init/mysql:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 15

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespw}
    ports:
      - "5432:5432"
    volumes:
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-user:
    <<: *java-service
    build:
      context: ../tainted-spring-auth-user
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootpw}"
    ports:
      - "8081:8081"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  diary:
    <<: *java-service
    build:
      context: ../tainted-spring-diary
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgrespw}"
      DIARY_KEK_BASE64: "${DIARY_KEK_BASE64:-YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY=}"
    ports:
      - "8082:8082"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  mindgraph:
    <<: *java-service
    build:
      context: ../tainted-spring-mindgraph
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgrespw}"
      SERVICES_DIARY_URL: "http://diary:8082"
    ports:
      - "8083:8083"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  community:
    <<: *java-service
    build:
      context: ../tainted-spring-community
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootpw}"
    ports:
      - "8085:8085"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  counseling:
    <<: *java-service
    build:
      context: ../tainted-spring-counseling
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      SERVICES_MINDGRAPH_URL: "http://mindgraph:8083"
      SERVICES_COMMUNITY_URL: "http://community:8085"
    ports:
      - "8084:8084"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  analytics:
    <<: *java-service
    build:
      context: ../tainted-spring-analytics
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgrespw}"
    ports:
      - "8086:8086"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  notification:
    <<: *java-service
    build:
      context: ../tainted-spring-notification
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
    ports:
      - "8087:8087"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패.
      test: ["CMD", "curl", "-fsS", "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  bff-gateway:
    <<: *java-service
    build:
      context: ../tainted-spring-bff-gateway
    depends_on:
      auth-user:
        condition: service_healthy
      diary:
        condition: service_healthy
      mindgraph:
        condition: service_healthy
      counseling:
        condition: service_healthy
      community:
        condition: service_healthy
      analytics:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:-}"
      SPRING_PROFILES_ACTIVE: "docker"
      SERVICES_AUTHUSER_URL: "http://auth-user:8081"
      SERVICES_DIARY_URL: "http://diary:8082"
      SERVICES_MINDGRAPH_URL: "http://mindgraph:8083"
      SERVICES_COUNSELING_URL: "http://counseling:8084"
      SERVICES_COMMUNITY_URL: "http://community:8085"
      SERVICES_ANALYTICS_URL: "http://analytics:8086"
    ports:
      - "8080:8080"
    healthcheck:
      # 런타임 이미지에 설치한 curl 사용. -f: 비2xx 응답이면 실패 → actuator DOWN 시 unhealthy.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["ui"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      # 호스트 8090 → 컨테이너 8080. (8080은 bff-gateway가 사용하므로 충돌 회피)
      - "8090:8080"

volumes:
  mysql-data:
  postgres-data:
